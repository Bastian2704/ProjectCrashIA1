{% extends "base.html" %}
{% block title %}CrashVision — Subir Video{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <h1 class="mb-1 fw-bold">Detección de Accidentes</h1>
    <p class="text-secondary mb-4">Sube un video y el sistema detectará automáticamente eventos de accidente.</p>

    <div class="card bg-secondary bg-opacity-10 border-secondary">
      <div class="card-body p-4">
        <form id="upload-form" enctype="multipart/form-data">

          <div class="mb-3">
            <label for="video-input" class="form-label">Archivo de video</label>
            <input
              type="file"
              id="video-input"
              name="video"
              accept=".mp4,.avi,.mov,.mkv"
              class="form-control bg-dark text-light border-secondary"
              required
            />
            <div class="form-text text-secondary">Formatos: MP4, AVI, MOV, MKV — máx. 500 MB</div>
          </div>

          <div class="mb-4">
            <label class="form-label">Modo de análisis</label>
            <div class="d-flex flex-column gap-2">

              <div class="form-check p-3 rounded border border-secondary bg-dark bg-opacity-25">
                <input class="form-check-input" type="radio" name="mode-selector" id="mode-n" value="n" checked>
                <label class="form-check-label w-100" for="mode-n">
                  <span class="fw-semibold">YOLOv8n</span>
                  <span class="badge bg-success ms-2">Rápido</span>
                  <div class="text-secondary small mt-1">Nano — 6.2 MB · mAP@50: 0.847 · Recomendado para CPU</div>
                </label>
              </div>

              <div class="form-check p-3 rounded border border-secondary bg-dark bg-opacity-25">
                <input class="form-check-input" type="radio" name="mode-selector" id="mode-s" value="s">
                <label class="form-check-label w-100" for="mode-s">
                  <span class="fw-semibold">YOLOv8s</span>
                  <span class="badge bg-warning text-dark ms-2">Preciso</span>
                  <div class="text-secondary small mt-1">Small — 22.5 MB · mAP@50: 0.891 · Mayor exactitud</div>
                </label>
              </div>

              <div class="form-check p-3 rounded border border-danger bg-dark bg-opacity-25">
                <input class="form-check-input" type="radio" name="mode-selector" id="mode-compare" value="compare">
                <label class="form-check-label w-100" for="mode-compare">
                  <span class="fw-semibold text-danger">Comparar ambos modelos</span>
                  <span class="badge bg-danger ms-2">Experimento</span>
                  <div class="text-secondary small mt-1">Corre YOLOv8n y YOLOv8s sobre el mismo video · Muestra F1, Recall, Precision y métricas de velocidad lado a lado</div>
                </label>
              </div>

            </div>
            <input type="hidden" id="mode-hidden" name="mode" value="single">
            <input type="hidden" id="model-hidden" name="model" value="n">
          </div>

          <button type="submit" id="submit-btn" class="btn btn-danger w-100">
            Analizar video
          </button>
        </form>

        <div id="progress-section" class="mt-4 d-none">
          <p class="text-secondary mb-2" id="status-text">Procesando...</p>
          <div class="progress" style="height: 6px;">
            <div
              id="progress-bar"
              class="progress-bar progress-bar-striped progress-bar-animated bg-danger"
              style="width: 100%"
            ></div>
          </div>
        </div>

        <div id="error-section" class="mt-3 d-none">
          <div class="alert alert-danger mb-0" id="error-msg"></div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
