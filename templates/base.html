<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CrashVision{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body class="bg-dark text-light min-vh-100 d-flex flex-column">

  <nav class="navbar navbar-dark bg-black border-bottom border-secondary">
    <div class="container">
      <a class="navbar-brand fw-bold text-danger" href="/">
        &#9888; CrashVision
      </a>
    </div>
  </nav>

  <main class="container flex-grow-1 py-5">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-secondary small py-3 border-top border-secondary">
    CrashVision &mdash; UDLA IA1 &copy; 2026
  </footer>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
